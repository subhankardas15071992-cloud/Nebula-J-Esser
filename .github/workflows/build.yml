name: Build Nebula J-Esser

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-2022
            configure: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DNJ_BUILD_TESTS=ON -DNJ_ENABLE_CLAP=ON
            build: cmake --build build --config Release --parallel
            test: ctest --test-dir build -C Release --output-on-failure
            artifact: build/*_artefacts/Release
          - name: Linux x86_64
            os: ubuntu-24.04
            configure: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DNJ_BUILD_TESTS=ON -DNJ_ENABLE_CLAP=ON
            build: cmake --build build --parallel
            test: ctest --test-dir build --output-on-failure
            artifact: build/*_artefacts/Release
          - name: macOS x86_64
            os: macos-15-intel
            configure: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64 -DNJ_BUILD_TESTS=ON -DNJ_ENABLE_CLAP=ON
            build: cmake --build build --parallel
            test: ctest --test-dir build --output-on-failure
            artifact: build/*_artefacts/Release
          - name: macOS arm64
            os: macos-14
            configure: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DNJ_BUILD_TESTS=ON -DNJ_ENABLE_CLAP=ON
            build: cmake --build build --parallel
            test: ctest --test-dir build --output-on-failure
            artifact: build/*_artefacts/Release

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libasound2-dev libjack-jackd2-dev ladspa-sdk lv2-dev libfreetype6-dev libfontconfig1-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libgl1-mesa-dev

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build
        run: ${{ matrix.build }}

      - name: Test
        run: ${{ matrix.test }}

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-J-Esser-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
